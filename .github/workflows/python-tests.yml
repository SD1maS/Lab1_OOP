name: Python Tests CI

on:
  push:
    branches: [ "main", ]
  pull_request:
    branches: [ "main", ]

jobs:
  build:

    runs-on: Windows 11
    
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Run unittests
      run: python -m unittest test_matrix_operations.py
